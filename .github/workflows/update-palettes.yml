name: Update Color Palettes

on:
  schedule:
    # Run at 00:00 UTC every day
    - cron: '0 0 * * *'
  workflow_dispatch: # Allow manual trigger from GitHub UI

jobs:
  update-palettes:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Needed to push changes back to repo

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Python dependencies
        run: |
          pip install -r requirements.txt

      - name: Install Node dependencies
        run: npm ci

      - name: Run Palette Update Script
        run: npm run update-palettes

      - name: Commit and Push Changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          
          # Check for changes
          if [[ -n $(git status --porcelain src/data/realSites.ts) ]]; then
            echo "Changes detected in realSites.ts"
            git add src/data/realSites.ts
            git commit -m "chore: auto-update color palettes [skip ci]"
            git push
          else
            echo "No changes to commit"
          fi
